name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest
      - name: Python compile
        run: python3 -m py_compile scripts/*.py
      - name: Workflow safety policy
        run: python3 scripts/verify-workflow-policy.py
      - name: Tests
        run: python3 -m pytest -q

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      # False positive mitigation: restrict audit level so routine advisories do not break unrelated PRs
      - run: npm audit --omit=dev --audit-level=high
